<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Posts</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0;
    }

    .form-wrapper {
      max-width: 600px;
      margin: 50px auto;
      background-color: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    h2 {
      text-align: left;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
    }

    label {
      font-weight: 500;
      color: #444;
    }

    input[type="text"],
    input[type="url"],
    input[type="file"],
    textarea {
      width: 100%;
      padding: 10px 14px;
      margin-top: 5px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
    }

    button {
      background-color: #3f51b5;
      color: #fff;
      border: none;
      padding: 12px 25px;
      font-size: 15px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #303f9f;
    }

    hr {
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <div class="form-wrapper">
    <h2>Add a New Vlog Post</h2>
    <form method="POST" action="{% url 'manage_posts' %}" enctype="multipart/form-data">
  {% csrf_token %}
  
  <label>Title:</label>
  <input type="text" name="title" required>

  <label>Description:</label>
<textarea name="description" rows="3"></textarea>

  <label>URL:</label>
  <input type="url" name="url" placeholder="Video URL">

  <label>Upload Image:</label>
  <input type="file" name="image" accept="image/*" required>
  <label>
    <input type="checkbox" name="is_article">
    Article?
  </label><br><br>
 

  <button type="submit">Add Post</button>
</form>

  </div>

  <hr>

  {% include "myapp/administrator/admin_vlogs.html" %}

</body>
<script src="https://cdn.tiny.cloud/1/itqdp94i9u9yudvko3lgv2zdwa0keqwrwk4zvau9goesxhzx/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
<script>
  tinymce.init({
    selector: 'textarea[name="description"]',
    height: 300,
    menubar: false,
    plugins: 'link image code lists',
    toolbar: 'undo redo | bold italic underline | alignleft aligncenter alignright | bullist numlist | link image | code',
    branding: false
  });
</script>
</html>
